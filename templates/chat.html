<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>

    <style>
		
        body {
            background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            margin: 0;
        }

        .chat {
            margin-top: 10px;
            height: 90vh; /* Taller bot */
        }

        .card {
            height: 100%;
            width: 100%;
            max-width: 100%;
            border-radius: 20px;
            background: rgba(25, 25, 25, 0.95);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: none;
        }

        .msg_head {
            background: linear-gradient(90deg, #0f2027, #203a43, #2c5364);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 15px;
            color: #fff;
        }

        .user_img {
            height: 60px;
            width: 60px;
            border: 2px solid #00f2fe;
        }

        .user_info span {
            font-size: 20px;
            font-weight: bold;
        }

        .msg_card_body {
            overflow-y: auto;
            height: calc(90vh - 160px); /* Larger chat area */
            background: rgba(15, 15, 15, 0.9);
            padding: 20px;
        }

        .msg_cotainer, .msg_cotainer_send {
            padding: 16px;
            border-radius: 14px;
            max-width: 80%;
            font-size: 17px;
            line-height: 1.4;
        }

        .msg_cotainer {
            background: rgba(0, 150, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(0, 150, 255, 0.3);
        }

        .msg_cotainer_send {
            background: rgba(0, 255, 200, 0.15);
            color: #fff;
            border: 1px solid rgba(0, 255, 200, 0.3);
        }

        .msg_time, .msg_time_send {
            font-size: 12px;
            margin-top: 5px;
            display: block;
            opacity: 0.6;
        }

        .card-footer {
            background: rgba(20, 20, 20, 0.95);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .form-control {
            background: rgba(30, 30, 30, 0.8);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
            height: 50px;
        }

        .form-control:focus {
            background: rgba(40, 40, 40, 0.9);
            color: #fff;
            box-shadow: none;
            border-color: #00f2fe;
        }

        .send_btn {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            border: none;
            color: #fff;
            height: 50px;
            font-size: 18px;
        }

        .send_btn:hover {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        select.form-control {
            background: rgba(30, 30, 30, 0.8);
            color: #fff;
            height: 50px;
            font-size: 16px;
        }
    </style>
</head>

<body>
	
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">		
            <div class="col-md-10 col-xl-8 chat"> <!-- Increased width -->
                <div class="card">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>Medical Chatbot</span>
                                <p>Ask me anything!</p>
                            </div>
                        </div>
                    </div>
                    <div id="messageFormeight" class="card-body msg_card_body"></div>
                    <div class="card-footer">
                        <p style="color: #bbb; font-size: 13px;">
                            
                        </p>
                        <form id="messageArea" class="input-group">
                            <select id="lang" name="lang" class="form-control" style="max-width:150px;">
                                <option value="en">English</option>
                                <option value="hi">Hindi</option>
                                <option value="fr">French</option>
                                <option value="es">Spanish</option>
                                <option value="de">German</option>
                                <option value="zh-cn">Chinese</option>
                                
                                <option value="mr">Marathi</option>
                            </select>
                            <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required/>
                            <div class="input-group-append">
                                <button type="submit" id="send" class="input-group-text send_btn">
                                    <i class="fas fa-location-arrow"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $("#messageArea").on("submit", function(event) {
                const date = new Date();
                const hour = date.getHours();
                const minute = date.getMinutes();
                const str_time = hour+":"+minute;
                var rawText = $("#text").val();
                var selectedLang = $("#lang").val();

                var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + escapeHtml(rawText) + '<span class="msg_time_send">'+ str_time + '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';
                
                $("#text").val("");
                $("#messageFormeight").append(userHtml);
                
                // Scroll to bottom
                $('#messageFormeight').scrollTop($('#messageFormeight').prop('scrollHeight'));

                $.ajax({
                    data: { msg: rawText, lang: selectedLang },
                    type: "POST",
                    url: "/get",
                }).done(function(data) {
                    // Format response with proper line breaks and HTML escaping
                    var formattedResponse = escapeHtml(data)
                        .replace(/\n\n/g, '</p><p>')
                        .replace(/\n/g, '<br>')
                        .replace(/^/, '<p>')
                        .replace(/$/, '</p>');
                    
                    var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + formattedResponse + '<span class="msg_time">' + str_time + '</span></div></div>';
                    $("#messageFormeight").append(botHtml);
                    
                    // Scroll to bottom
                    $('#messageFormeight').scrollTop($('#messageFormeight').prop('scrollHeight'));
                }).fail(function() {
                    var errorHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">Sorry, I encountered an error. Please try again.<span class="msg_time">' + str_time + '</span></div></div>';
                    $("#messageFormeight").append(errorHtml);
                    
                    // Scroll to bottom
                    $('#messageFormeight').scrollTop($('#messageFormeight').prop('scrollHeight'));
                });
                event.preventDefault();
            });
        });
        
        // Helper function to escape HTML special characters
        function escapeHtml(text) {
            if (!text) return '';
            var map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
    </script>
</body>
</html>
